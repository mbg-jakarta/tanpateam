<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBG JAKARTA - Makan Bergizi Gratis | Mewujudkan Generasi Emas Indonesia</title>
    <meta name="description" content="Program Makan Bergizi Gratis (MBG) adalah inisiatif nasional untuk meningkatkan kualitas gizi anak sekolah, santri, ibu hamil, dan menyusui di seluruh Indonesia.">
    
    <!-- SEO Meta Tags -->
    <meta name="keywords" content="makan bergizi gratis, gizi anak sekolah, stunting indonesia, generasi emas 2045, program pemerintah gizi">
    <meta property="og:title" content="MBG JAKARTA - Makan Bergizi Gratis">
    <meta property="og:description" content="Mewujudkan generasi emas Indonesia yang sehat dan cerdas melalui asupan gizi yang seimbang.">
    <meta property="og:type" content="website">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        primary: '#059669',
                        secondary: '#f59e0b',
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .section-padding { padding: 4rem 0; }
        @media (min-width: 768px) { .section-padding { padding: 6rem 0; } }
        .container-custom { max-width: 80rem; margin: 0 auto; padding: 0 1.5rem; }
        
        /* Simple Fade In Animation */
        .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root">
        <!-- Fallback loading -->
        <div class="flex items-center justify-center min-h-screen">
            <p class="text-slate-400 animate-pulse">Memuat Website MBG...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Components ---

        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'Beranda', href: '#' },
                { name: 'Tentang MBG', href: '#tentang' },
                { name: 'Menu Gizi', href: '#menu' },
                { name: 'Dampak', href: '#dampak' },
            ];

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'glass shadow-sm py-3' : 'bg-transparent py-5'}`}>
                    <div className="container-custom flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-primary p-2 rounded-lg">
                                <Icon name="utensils" className="text-white w-6 h-6" />
                            </div>
                            <span className="text-xl font-bold tracking-tight text-slate-900">
                                MBG JAKARTA<span className="text-primary">.id</span>
                            </span>
                        </div>

                        <div className="hidden md:flex items-center gap-8">
                            {navLinks.map((link) => (
                                <a key={link.name} href={link.href} className="text-sm font-medium text-slate-600 hover:text-primary transition-colors">
                                    {link.name}
                                </a>
                            ))}
                            <button className="bg-primary text-white px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-emerald-700 transition-all shadow-md">
                                Hubungi Kami
                            </button>
                        </div>

                        <button className="md:hidden p-2 text-slate-600" onClick={() => setIsOpen(!isOpen)}>
                            <Icon name={isOpen ? "x" : "menu"} />
                        </button>
                    </div>

                    {isOpen && (
                        <div className="md:hidden absolute top-full left-0 right-0 glass border-t border-slate-100 p-4 flex flex-col gap-4 shadow-lg">
                            {navLinks.map((link) => (
                                <a key={link.name} href={link.href} className="text-base font-medium text-slate-600 p-2" onClick={() => setIsOpen(false)}>
                                    {link.name}
                                </a>
                            ))}
                            <button className="bg-primary text-white px-5 py-3 rounded-xl text-center font-semibold">
                                Hubungi Kami
                            </button>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = () => (
            <section className="relative pt-32 pb-20 overflow-hidden">
                <div className="absolute top-0 right-0 -z-10 w-1/2 h-full bg-emerald-50 rounded-bl-[100px] hidden lg:block"></div>
                <div className="container-custom grid lg:grid-cols-2 gap-12 items-center">
                    <div className="fade-in">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-bold uppercase tracking-wider mb-6">
                            <Icon name="shield-check" className="w-4 h-4" />
                            Program Nasional Unggulan
                        </div>
                        <h1 className="text-5xl md:text-6xl font-bold text-slate-900 leading-[1.1] mb-6">
                            Membangun <span className="text-primary">Generasi Emas</span> Melalui Gizi Seimbang
                        </h1>
                        <p className="text-lg text-slate-600 mb-8 leading-relaxed max-w-xl">
                            Program Makan Bergizi Gratis hadir untuk memastikan setiap anak sekolah, santri, dan ibu hamil mendapatkan asupan nutrisi berkualitas demi masa depan Indonesia yang lebih cerah.
                        </p>
                        <div className="flex flex-wrap gap-4">
                            <button className="bg-primary text-white px-8 py-4 rounded-full font-bold flex items-center gap-2 hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-200">
                                Pelajari Program <Icon name="arrow-right" className="w-5 h-5" />
                            </button>
                        </div>
                    </div>
                    <div className="fade-in" style={{ animationDelay: '0.2s' }}>
                        <img src="https://picsum.photos/seed/nutrition/800/1000" alt="Nutrition" className="rounded-3xl shadow-2xl w-full" />
                    </div>
                </div>
            </section>
        );

        const MenuSection = () => {
            const menuItems = [
                { day: 'Senin', title: 'Nasi Kuning Ayam Bakar', icon: 'beef', color: 'bg-yellow-50 text-yellow-600' },
                { day: 'Selasa', title: 'Nasi Putih Ikan Goreng', icon: 'apple', color: 'bg-blue-50 text-blue-600' },
                { day: 'Rabu', title: 'Nasi Merah Daging Semur', icon: 'milk', color: 'bg-emerald-50 text-emerald-600' },
                { day: 'Kamis', title: 'Bubur Manado Spesial', icon: 'wheat', color: 'bg-orange-50 text-orange-600' },
            ];

            return (
                <section id="menu" className="section-padding bg-white">
                    <div className="container-custom">
                        <div className="text-center max-w-3xl mx-auto mb-16">
                            <h2 className="text-sm font-bold text-primary uppercase tracking-widest mb-3">Menu Gizi Seimbang</h2>
                            <h3 className="text-4xl font-bold text-slate-900 mb-6">Variasi Menu Harian Berkualitas</h3>
                        </div>
                        <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {menuItems.map((item, index) => (
                                <div key={item.day} className="fade-in p-6 rounded-3xl border border-slate-100 hover:border-primary/20 hover:shadow-xl transition-all cursor-default" style={{ animationDelay: `${index * 0.1}s` }}>
                                    <div className={`w-12 h-12 rounded-2xl ${item.color} flex items-center justify-center mb-6`}>
                                        <Icon name={item.icon} className="w-6 h-6" />
                                    </div>
                                    <div className="text-xs font-bold text-slate-400 uppercase mb-2">{item.day}</div>
                                    <h4 className="text-xl font-bold text-slate-900 mb-3">{item.title}</h4>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="bg-slate-900 text-slate-300 pt-20 pb-10">
                <div className="container-custom">
                    <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                        <div>
                            <div className="flex items-center gap-2 mb-6">
                                <div className="bg-primary p-2 rounded-lg">
                                    <Icon name="utensils" className="text-white w-6 h-6" />
                                </div>
                                <span className="text-xl font-bold tracking-tight text-white">MBG JAKARTA<span className="text-primary">.id</span></span>
                            </div>
                            <p className="text-sm">Program Nasional Makan Bergizi Gratis untuk mewujudkan Indonesia Emas 2045.</p>
                        </div>
                        <div>
                            <h4 className="text-white font-bold mb-6">Tautan</h4>
                            <ul className="space-y-4 text-sm">
                                <li><a href="#" className="hover:text-primary transition-colors">Beranda</a></li>
                                <li><a href="#tentang" className="hover:text-primary transition-colors">Tentang</a></li>
                                <li><a href="#menu" className="hover:text-primary transition-colors">Menu</a></li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="text-white font-bold mb-6">Kontak</h4>
                            <ul className="space-y-4 text-sm">
                                <li className="flex gap-2 items-center"><Icon name="map-pin" className="w-4 h-4 text-primary" /> Jakarta, Indonesia</li>
                                <li className="flex gap-2 items-center"><Icon name="mail" className="w-4 h-4 text-primary" /> info@MBGJAKARTA.id</li>
                            </ul>
                        </div>
                    </div>
                    <div className="pt-8 border-t border-slate-800 text-center text-xs">
                        <p>© 2026 Badan Gizi Nasional - Republik Indonesia.</p>
                    </div>
                </div>
            </footer>
        );

        const App = () => (
            <div className="min-h-screen">
                <Navbar />
                <Hero />
                <section id="tentang" className="section-padding bg-white">
                    <div className="container-custom grid lg:grid-cols-2 gap-12 items-center">
                        <div className="fade-in">
                            <img src="https://picsum.photos/seed/food-prep/800/600" alt="About" className="rounded-3xl shadow-lg" />
                        </div>
                        <div className="fade-in" style={{ animationDelay: '0.2s' }}>
                            <h2 className="text-sm font-bold text-primary uppercase tracking-widest mb-3">Tentang Program</h2>
                            <h3 className="text-4xl font-bold text-slate-900 mb-6">Misi Kami: Gizi Berkualitas untuk Semua</h3>
                            <p className="text-slate-600 mb-6 leading-relaxed">
                                Program Makan Bergizi Gratis (MBG) adalah inisiatif strategis pemerintah Indonesia untuk meningkatkan kualitas hidup masyarakat melalui asupan nutrisi yang tepat sasaran.
                            </p>
                        </div>
                    </div>
                </section>
                <MenuSection />
                <Footer />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
